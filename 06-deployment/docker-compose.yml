services:
  backend:
    build:
      context: ../04-development/backend
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-claude-opus-4-8}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}
      - LLM_CORS_ORIGINS=http://localhost:8080,http://localhost
    volumes:
      - uploads:/app/_uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ../04-development/frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  uploads:
